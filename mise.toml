[tools]
# --- Core Runtime & Build ---
python = "3.12"                  # Legacy backend runtime (FastAPI, until Scala parity)
uv = "latest"                    # Fast Python package installer/resolver
java = "temurin-25"              # Scala backend runtime (aligned with the engine repo)

# --- CLI Utilities ---
gh = "latest"                    # GitHub CLI for PRs and issues
jq = "latest"                    # JSON processor
yq = "latest"                    # YAML processor
ripgrep = "latest"               # High-performance code search

# --- Security & Quality ---
"pipx:pre-commit" = "latest"     # Git hooks manager

# ==============================================================================
# Setup & Quality Tasks
# ==============================================================================
[tasks.setup]
description = "📦 Install all project dependencies and register Git hooks locally"
run = "uv sync && pre-commit install"

[tasks.format]
description = "🧹 Format code using Ruff (linter autofixes and formatter)"
run = "uv run ruff check --fix . && uv run ruff format ."

[tasks.check]
description = "✅ Run validation checks (Ruff linter and format verification)"
run = "uv run ruff check . && uv run ruff format --check ."

# ==============================================================================
# Database Services & Migrations
# ==============================================================================
[tasks.db_up]
description = "🐳 Start PostgreSQL database container in the background"
run = "docker compose up --detach"

[tasks.db_down]
description = "🛑 Stop PostgreSQL database container"
run = "docker compose down"

[tasks.migrate]
description = "📈 Apply database migrations to the latest schema using Alembic"
run = "uv run alembic upgrade head"

[tasks.makemigrations]
description = "📝 Generate a new database migration script using Alembic auto-generation"
run = "uv run alembic revision --autogenerate --message"

[tasks.import]
description = "📥 Import games from SQLite to PostgreSQL"
run = "uv run python -m src.importer"

# ==============================================================================
# Documentation Control
# ==============================================================================
[tasks.docs]
description = "📖 Start the local MkDocs Material documentation dev server"
run = "uv run mkdocs serve"

[tasks.docs_build]
description = "🏗️ Compile documentation to static HTML assets"
run = "uv run mkdocs build"

[tasks.dev]
description = "🚀 Start the FastAPI backend development server"
run = "uv run uvicorn src.api.main:app --reload --port 8000"

# ==============================================================================
# Scala Backend (backend/) — the rewrite target; see backend/README.md
# GitHub Packages credentials are needed to resolve the engine artifact, hence
# the GITHUB_ACTOR/GITHUB_TOKEN fallbacks via the gh CLI.
# ==============================================================================
[tasks."backend:compile"]
description = "🔨 Compile the Scala backend"
dir = "backend"
run = 'GITHUB_ACTOR="${GITHUB_ACTOR:-$(gh api user --jq .login)}" GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token)}" sbt compile'

[tasks."backend:test"]
description = "🧪 Run Scala backend tests (real PostgreSQL via testcontainers)"
dir = "backend"
run = 'GITHUB_ACTOR="${GITHUB_ACTOR:-$(gh api user --jq .login)}" GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token)}" sbt test'

[tasks."backend:check"]
description = "✅ Full Scala backend validation (format check, coverage-gated tests)"
dir = "backend"
run = 'GITHUB_ACTOR="${GITHUB_ACTOR:-$(gh api user --jq .login)}" GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token)}" sbt scalafmtCheckAll clean coverage test coverageReport'

[tasks."backend:format"]
description = "✨ Reformat the Scala backend sources"
dir = "backend"
run = "sbt scalafmtAll"

[tasks."backend:run"]
description = "🚀 Start the Scala backend API server (port 8000)"
dir = "backend"
run = 'GITHUB_ACTOR="${GITHUB_ACTOR:-$(gh api user --jq .login)}" GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token)}" sbt run'
