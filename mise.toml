[tools]
# --- Core Runtime & Build ---
java = "temurin-25"              # Scala backend runtime (aligned with the engine repo)

# --- CLI Utilities ---
gh = "latest"                    # GitHub CLI for PRs and issues
jq = "latest"                    # JSON processor

# --- Security & Quality ---
lefthook = "latest"              # Git hooks manager (language-agnostic, parallel)
betterleaks = "latest"              # Secret scanning for staged/pushed commits
scalafmt = "3.11.1"           # native CLI; MUST match version in .scalafmt.conf

# ==============================================================================
# Setup & Quality Tasks
# ==============================================================================
[tasks.setup]
description = "📦 Install tooling and register Git hooks locally"
run = "lefthook install"

[tasks."hook:install"]
description = "🪝 Register Git hooks via lefthook"
run = "lefthook install"

[tasks."hook:run"]
description = "🪝 Run all pre-commit hooks against every file (CI / manual trigger)"
run = "lefthook run pre-commit --all-files"

# Scala build tasks. Resolving the engine artifact from GitHub Packages needs
# credentials; build.sbt derives them (env vars in CI, the gh CLI locally), so
# these stay plain `sbt`. See build.sbt for the why.
[tasks.compile]
description = "🔨 Compile the Scala backend"
run = "sbt compile"

[tasks.test]
description = "🧪 Run the backend tests (real PostgreSQL via testcontainers)"
run = "sbt test"

[tasks.check]
description = "✅ Repo-wide gate: full validation (format check, coverage-gated tests)"
run = "sbt scalafmtCheckAll clean coverage test coverageReport"

[tasks.format]
description = "✨ Reformat the Scala sources"
# Native scalafmt CLI (same binary/version as the lefthook hooks), so `format`
# output is exactly what the pre-commit hook expects — no reflow surprises on
# commit. `project.git = true` in .scalafmt.conf keeps it to tracked sources.
run = "scalafmt --config .scalafmt.conf ."

[tasks.run]
description = "🚀 Start the API server (port 8000)"
run = "sbt run"

# ==============================================================================
# Database & Stack Services
# ==============================================================================
[tasks."db:up"]
description = "🐳 Start only the PostgreSQL container in the background"
run = "docker compose up --detach db"

[tasks."db:down"]
description = "🛑 Stop and remove only the PostgreSQL container (named volume survives)"
run = "docker compose rm --force --stop --volumes db"

[tasks."stack:up"]
description = "🐳 Start the full stack (db + api + ui); ui image is amd64-only for now"
run = "docker compose up --detach"

[tasks."stack:down"]
description = "🛑 Stop and remove the full stack"
run = "docker compose down"

[tasks."docs:dev"]
description = "📖 Start the local Astro/Starlight documentation dev server"
dir = "docs"
run = "npm run dev"

[tasks."docs:build"]
description = "🏗️ Compile documentation to static HTML assets"
dir = "docs"
run = "npm run build"

