# ==============================================================================
# SonarCloud Project Configuration
# ==============================================================================
sonar.organization=rabestro
sonar.projectKey=rabestro_dicechess-analytics
sonar.projectName=dicechess-analytics

# Source and test roots (root-level layout — the Scala project lives at the repo root).
sonar.sources=src/main/scala
sonar.tests=src/test/scala
sonar.sourceEncoding=UTF-8

# Entry points (server + one-shot maintenance runners) are excluded from coverage, matching
# build.sbt's coverageExcludedFiles; their logic lives in unit-tested repositories/services.
sonar.coverage.exclusions=**/Main.scala,**/EvaluateMonteCarloApp.scala,**/ExportOpeningBookApp.scala,**/maintenance/**

# ==============================================================================
# Coverage import (sbt-scoverage XML, produced by `coverageReport` in CI)
# ==============================================================================
sonar.scala.coverage.reportPaths=target/scala-3.8.3/scoverage-report/scoverage.xml
