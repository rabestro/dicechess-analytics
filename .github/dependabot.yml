version: 2
updates:
  - package-ecosystem: "sbt"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    assignees:
      - "rabestro"
    labels:
      - "dependencies"
      - "ci-cd"
    ignore:
      # sbt 1.x -> 2.x is a breaking major requiring a deliberate, manual
      # migration (plugin compatibility, build definition changes) - not an
      # automated bump.
      - dependency-name: "org.scala-sbt:sbt"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    assignees:
      - "rabestro"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "08:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    assignees:
      - "rabestro"
