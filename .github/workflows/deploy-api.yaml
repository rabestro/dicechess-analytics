name: "CD: Publish API Image"

on:
  push:
    branches: [main]
    # Source/build inputs only — doc-only changes should not rebuild the image.
    paths:
      - "src/**"
      - "build.sbt"
      - "project/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-api.yaml"
  workflow_dispatch:

# Newest commit wins: cancelling a superseded build prevents an older image
# from being pushed as :latest after a newer one.
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push to ghcr
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU (arm64 emulation for the runtime stage)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
          # metadata-action covers title/description/source/licenses/version/revision
          # automatically; these two are the only OCI labels it cannot derive
          labels: |
            org.opencontainers.image.authors=Jegors Čemisovs
            org.opencontainers.image.documentation=https://rabestro.github.io/dicechess-analytics

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GITHUB_ACTOR=${{ github.actor }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
