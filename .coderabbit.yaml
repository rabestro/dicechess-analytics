# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# =============================================================================
# CodeRabbit Configuration — Dice Chess Analytics (Scala 3)
# =============================================================================
# Scala 3 analytics backend: http4s + Tapir + Doobie + Flyway over PostgreSQL,
# with the dicechess engine as the source of truth for game rules.
# Performance, typing, and data integrity are key.
# =============================================================================

language: en-US

reviews:
  # ── Review Style ──────────────────────────────────────────────────────────
  # "assertive" provides rigorous, performance-oriented feedback suitable
  # for a data-intensive backend where efficiency and strict typing matter.
  profile: assertive

  # ── Disable Summaries & Decorations ───────────────────────────────────────
  high_level_summary: false
  poem: false
  collapse_walkthrough: true

  # ── Auto-Review Settings ──────────────────────────────────────────────────
  auto_review:
    enabled: false
    drafts: false
    base_branches:
      - main

  # ── Path Filters ──────────────────────────────────────────────────────────
  # Exclude machine-generated, vendored, and build artifact paths from review.
  path_filters:
    - "!**/target/**"
    - "!**/node_modules/**"
    - "!docs/.astro/**"
    - "!docs/dist/**"
    - "!docs/package-lock.json"

  # ── Tool Configuration ───────────────────────────────────────────────────
  tools:
    actionlint:
      enabled: true        # Validate GitHub Actions workflow YAML syntax
    gitleaks:
      enabled: true        # Detect leaked secrets (complements the lefthook hook)
    shellcheck:
      enabled: true        # Lint shell scripts in CI workflows and mise tasks
    markdownlint:
      enabled: true        # Validate documentation formatting

  # ── Domain-Specific Path Instructions ─────────────────────────────────────
  path_instructions:
    - path: "src/main/scala/**"
      instructions: |
        Scala 3 backend (http4s + Tapir + Doobie). The build is strict
        (-Werror, -Wunused:all). When reviewing:
        - The REST contract (snake_case JSON, FastAPI-style {"detail": ...} errors)
          must stay stable: it is consumed by dicechess-analytics-ui.
        - Doobie queries: watch for N+1 patterns and missing indexes on
          frequently queried columns (fen_hash, player ids, started_at).
        - Game rules must come from the dicechess engine library, never be
          re-implemented locally.
        - Effects: cats-effect IO; no blocking calls outside IO.blocking.

    - path: "src/main/resources/db/migration/**"
      instructions: |
        Flyway migrations over the production database (140k+ games).
        When reviewing:
        - Migrations are append-only: never edit an applied version.
        - Flag destructive changes (drop column/table) and ensure they are intentional.
        - Large-table index creation should consider CONCURRENTLY.

    - path: "src/test/**"
      instructions: |
        MUnit + testcontainers (real PostgreSQL). When reviewing:
        - Tests must run the real Flyway migration from scratch, not hand-built schemas.
        - Watch for stale-response races in async tests; controlled promise ordering
          is the established pattern.

    - path: "docs/**"
      instructions: |
        Astro/Starlight documentation site.
        When reviewing:
        - Check for broken internal links; prefer relative links over hardcoded base paths.
        - Ensure Markdown and Mermaid diagrams are correctly formatted.

    - path: ".github/workflows/**"
      instructions: |
        CI/CD workflows for the Scala backend and docs.
        When reviewing:
        - Verify that `mise` tasks (`mise run ...`) are favored over raw bash scripts
          unless the job needs only the JVM toolchain.
        - Ensure secrets are handled securely (GitHub Packages tokens via BuildKit
          secrets, never in image layers).
