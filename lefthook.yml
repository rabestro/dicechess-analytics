# Lefthook — Git hooks configuration
# Docs: https://github.com/evilmartians/lefthook
# All pre-commit jobs run in parallel unless they share stdout.

pre-commit:
  parallel: true
  jobs:
    # Secret scanning: abort if any staged diff leaks a credential
    # betterleaks is the successor by the gitleaks author (gitleaks is feature-frozen).
    # Detection only: no rule validation configured, nothing leaves the machine.
    - name: betterleaks
      run: betterleaks git --pre-commit --redact --staged

    # Python linting + formatting (only when .py files are staged).
    # check --fix and format both rewrite files: one sequential job avoids
    # concurrent writes under parallel: true
    - name: ruff
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}

    # Native scalafmt CLI: ~44ms per commit. The pinned mise version must match
    # backend/.scalafmt.conf (the native binary does not auto-dispatch versions).
    - name: scalafmt
      glob: "backend/**.{scala,sbt}"
      run: scalafmt --config backend/.scalafmt.conf --test {staged_files}

# Pre-push is a hermetic one-second safety net, not a test gate: a full-project
# format check via the native CLI (no Docker, no network). It catches what the
# per-commit hook can miss: --no-verify commits, rebase/merge fallout.
# The full gate (tests + coverage) is `mise run check` before a PR — enforced by CI;
# heavy/integration checks on pre-push train the --no-verify reflex and block
# push-as-backup, so they deliberately live in CI only.
pre-push:
  jobs:
    - name: scalafmt-all
      glob: "backend/**.{scala,sbt}"
      run: scalafmt --config backend/.scalafmt.conf --test backend
